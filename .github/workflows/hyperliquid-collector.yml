name: Hyperliquid Collector

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: hyperliquid-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Prepare paths
        id: prep
        run: |
          mkdir -p cloud_data
          DATE_UTC=$(date -u +%F)
          LOG_PATH="cloud_data/events_${DATE_UTC}.jsonl"
          touch "$LOG_PATH"
          echo "date_utc=$DATE_UTC" >> "$GITHUB_OUTPUT"
          echo "log_path=$LOG_PATH" >> "$GITHUB_OUTPUT"

      - name: Collect events (~4 minutes)
        run: |
          python -u density_screener.py \
            --min-wall-ratio 3 \
            --min-wall-usd 10000 \
            --min-day-volume-usd 0 \
            --approach-ticks 4 \
            --breakout-ticks 2 \
            --bounce-pct 0.5 \
            --min-persistence-sec 10 \
            --max-signal-age-sec 180 \
            --scan-interval-sec 15 \
            --mids-poll-sec 1 \
            --metadata-refresh-sec 300 \
            --run-seconds 260 \
            --log-path "${{ steps.prep.outputs.log_path }}"

      - name: Update run log
        run: |
          if [ ! -f cloud_data/run_log.csv ]; then
            echo "timestamp_utc,run_id,workflow,log_path" > cloud_data/run_log.csv
          fi
          echo "$(date -u +%FT%TZ),${{ github.run_id }},${{ github.workflow }},${{ steps.prep.outputs.log_path }}" >> cloud_data/run_log.csv

      - name: Update quality profile (best-known filters)
        run: |
          if ls cloud_data/events_*.jsonl >/dev/null 2>&1; then
            python -u derive_quality_rules.py \
              --log-glob "cloud_data/events_*.jsonl" \
              --out-json "cloud_data/quality_rules.json" \
              --mode quick \
              --min-resolved 30 || true
          else
            echo "No cloud event files yet."
          fi

      - name: Commit and push collected data
        run: |
          if [ -z "$(git status --porcelain -- cloud_data)" ]; then
            echo "No changes in cloud_data. Skip commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_data
          git commit -m "collector: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Trigger next collector run (cron fallback)
        if: ${{ success() && vars.HL_CHAIN_ENABLED != 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 20
          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/hyperliquid-collector.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
